<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="">
    <meta name="keywords" content="">
    <link rel="shortcut icon" href="./images/logo.jpg" type="image/x-icon">
    <title>wwf | 동물 </title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-dynamic-subset.min.css" />
    <link rel="stylesheet" href="./styles/reset.css">
    <link rel="stylesheet" href="./styles/common.css">
    <link rel="stylesheet" href="./styles/index.css">
    <link rel="stylesheet" href="./styles/responsive.css">
</head>
<body>
    <div id="wrap">
        <!-- 1행 캠페인 표지 -->
        <section class="container intro">
            <p class="logo"><img src="./images/logo.jpg" alt="wwf"></p>
            <h1><span>생존에 벼랑 끝에 서 있는</span><span>북극곰을 지켜주세요.</span></h1>
            <a href="#" class="sponsor_btn"><em>북금곰 후원하기</em><!-- after --></a>
        </section>
        <!-- 2행 퀴즈 -->
        <div class="container quiz_bg">
            <div class="contents quiz">
                <div class="quiz_title">
                    <h1>Quiz</h1>
                    <h2><span>20년 사이 북극 빙하 면적은</span><span>20년 사이 북극 빙하 면적은 몇 % 감소했을까요?</span></h2>
                </div>
                <form action="#" method="post" class="quiz_frm">
                        <ol>
                            <li>
                                <label for="percent30">30%</label>
                                <input type="radio" name="quiz_group" id="percent30" value="percent30">
                            </li>
                            <li>
                                <label for="percent40">40%</label>
                                <input type="radio" name="quiz_group" id="percent40" value="percent40">
                            </li>
                            <li>
                                <label for="percent50">50%</label>
                                <input type="radio" name="quiz_group" id="percent50" value="percent50">
                            </li>
                            <li>
                                <label for="percent60">60%</label>
                                <input type="radio" name="quiz_group" id="percent60" value="percent60">
                            </li>
                        </ol>
                        <button type="button" id="correct_btn"><span>정답 확인 하기</span></button>
                </form>
                <div class="situation">
                    <p><img src="./images/quiz_contents.png" alt="참여현황"></p>
                    <span>* 퀴즈 참여 현황은 매주 업데이트 됩니다.</span>
                </div>
            </div>
        </div>
        <!-- 3행 영상 -->
        <div class="container video_bg">
            <div class="contents video">
                <h2>죽은 어미 곁을 떠나지 못하는<br>새끼 북극곰의 이야기</h2>
                <div class="video_img">
                    <p><img src="./images/vdo.png" alt="동영상"></p>
                </div>
                <a href="#" class="sponsor_btn"><em>북금곰 후원하기</em><!-- after --></a>
            </div>
        </div>
        <!-- 4행 50감소 -->
        <div class="container reduction_bg">
            <div class="contents reduction"></div>
        </div>
        <!-- 5행 인류재앙 -->
        <div class="container disaster_bg">
            <div class="contents disaster"></div>
        </div>
        <!-- 6행 빙하위기 -->
        <div class="container crisis_bg">
            <div class="contents crisis"></div>
        </div>
        <!-- 7행 wwf 단체소개 -->
        <div class="container wwf_bg">
            <div class="contents wwf"></div>
        </div>
        <!-- 8행 캠페인 -->
        <div class="container campaign_bg">
            <div class="contents campaign"></div>
        </div>
        <!-- 9행 활동 내역 -->
        <div class="container activity_bg">
            <div class="contents activity"></div>
        </div>
        <!-- 10행 안내 -->
        <div class="container sponsor_bg">
            <div class="contents sponsor"></div>
        </div>
        <footer></footer>
    </div>
</body>
</html>
